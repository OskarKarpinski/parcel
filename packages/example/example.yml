name: example
version: 1.0.0
release: 1
description: Example parcel package
architecture:
  - x86_64
  - aarch64

delta: false

source:
  # - https://example.com/test.tar.gz
  - ./example.desktop

# source-x86-64:
#   - https://example.com/bin-x86_64.zip:abc123...
#
# source-aarch64:
#   - https://example.com/bin-aarch64.zip:abc123...

build_script: |
  echo "Test file in build root" > test.txt
  echo "Building..."
  echo "#!/bin/bash" > example.sh
  echo "echo \"Hello World\"" >> example.sh
  chmod +x example.sh

install_script: |
  mkdir -p $OUTPUT_DIR/bin
  mv ./example.sh $OUTPUT_DIR/bin/example
  mv $SOURCE_DIR/example.desktop $OUTPUT_DIR/example.desktop

files:
  bin:
    - bin/example:link
  desktop:
    - example.desktop:copy
